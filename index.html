<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    * {

    header {

    }

    header strong {

    }

    header a {
      padding: 9px 12px;

      background: #238636;

      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      white-space: nowrap;
    }

    main {
      width: 100%;
      height: calc(100vh - 58px);
      background: #555;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    @media (max-width: 600px) {
